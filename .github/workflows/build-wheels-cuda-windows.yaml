# =============================================================================
# Windows x64 CUDA wheel builder for llama-cpp-python (fork)
# =============================================================================
#
# WHY THIS FORK EXISTS
#   Upstream abetlen/llama-cpp-python disabled Windows CUDA CI in July 2025
#   (commit 98fda8c) after chronic VS/nvcc incompatibilities:
#     - abetlen/llama-cpp-python#1543  (root cause: the compiler-bypass
#                                       workaround silences nvcc's _MSC_VER
#                                       check, producing wheels that compile
#                                       but SEGFAULT at the first Llama(...)
#                                       call at runtime — see the ban-grep
#                                       step in lint-workflow for the exact
#                                       flag string we refuse to ship)
#     - abetlen/llama-cpp-python#1551, #1838, #1894  (same class of failures)
#     - abetlen/llama-cpp-python#2136  (maintainer status — Quansight funding
#                                       offer unanswered, fork is the pragmatic path)
#
# THE _MSC_VER / nvcc COMPATIBILITY WALL
#   nvcc's host_config.h rejects _MSC_VER values above a per-generation cap:
#     CUDA 12.2–12.3: _MSC_VER >= 1940 rejected  (cap = 1939)
#     CUDA 12.4–12.9: _MSC_VER >= 1950 rejected  (cap = 1949, any VS 2022)
#   GitHub's windows-2022 image ships multiple MSVC toolsets on disk
#   (currently 14.29 + 14.44). The probe-msvc step auto-selects the newest
#   toolset whose _MSC_VER is within the cap for the requested CUDA version.
#   Upstream's workaround was the banned -DCMAKE_CUDA_FLAGS setting (see
#   lint-workflow ban-grep for the literal) which silences the compile error
#   but the produced binaries segfault at runtime. See #1543 — reporter
#   confirmed crash on the very first call to `Llama(model_path=...)`.
#
# WHAT THIS WORKFLOW DOES
#   1. Auto-selects the newest compatible MSVC toolset from disk via the
#      probe-msvc step (runs FIRST for instant fail on bad inputs). The step
#      enumerates `VC\Tools\MSVC\*` directories (~0ms), looks up the CUDA
#      _MSC_VER cap from a compatibility matrix derived from host_config.h,
#      and picks the newest toolset where _MSC_VER <= cap. Override with an
#      explicit `msvc_toolset` dispatch input for debugging.
#   2. Does NOT use ilammy/msvc-dev-cmd — conda's activation hook also calls
#      vcvarsall.bat, and two vcvars calls overflow CMD's 8192-char INCLUDE/LIB
#      limit. Preflight calls cl.exe by full path for _MSC_VER verification.
#      Phase 2 (build) will use cmake's VS generator or a clean vcvarsall
#      subprocess.
#   3. Installs CUDA via mamba (single install path — no parallel Jimver
#      full-installer; see Jimver/cuda-toolkit#382 for the hang on
#      windows-2022 + CUDA 12.5+). Mamba steps use `shell: pwsh` because
#      Git Bash corrupts conda channel arguments on Windows.
#   4. Preflights the toolchain with named hard-fail assertions (no
#      warn-and-continue anywhere). Assertion steps emit remediation hints
#      to $GITHUB_STEP_SUMMARY on red; forensics table on green.
#   5. Bans the compiler-bypass workaround via a parallel grep self-check on
#      ubuntu-latest (lint-workflow job — that job's grep command is the
#      ONLY place in this file where the banned flag appears literally).
#
# ROADMAP
#   Phase 1 (this file, current):     Scaffold + toolchain pinning + preflight
#   Phase 2 (future, same file):      Build job (scikit-build-core -> wheel)
#   Phase 3 (future, same file):      Smoke-test publish gate
#   Phase 4 (future, same file):      PEP 503 index publish on gh-pages
#   See .planning/ROADMAP.md for details.
#
# ESCAPE HATCH: msvc_toolset DISPATCH INPUT
#   The default is `auto` — probe-msvc picks the newest compatible toolset.
#   If auto-select produces unexpected results after a runner image rotation,
#   override with an explicit pin (e.g. `msvc_toolset=14.44`). DO NOT
#   re-enable the compiler-bypass workaround that the lint-workflow job bans.
#   The _MSC_VER cap is computed FROM the CUDA compatibility matrix, so the
#   toolset choice and cap are always consistent.
#
# AUTHORITATIVE REFERENCES
#   - Microsoft's MSVC 14.40 devblog (toolset<->_MSC_VER formula):
#       https://devblogs.microsoft.com/cppblog/msvc-toolset-minor-version-number-14-40-in-vs-2022-v17-10/
#   - actions/runner-images#9701 (VC component removals, May 2024):
#       https://github.com/actions/runner-images/issues/9701
#   - Upstream root cause:
#       https://github.com/abetlen/llama-cpp-python/issues/1543
# =============================================================================

name: Build Wheels (CUDA Windows)

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version (CPython tag for the wheel)'
        type: choice
        default: '3.11'
        options:
          - '3.10'
          - '3.11'
          - '3.12'
      cuda_version:
        description: 'CUDA toolkit version (must match nvcc major.minor on runner)'
        type: choice
        default: '12.6.3'
        options:
          - '12.6.3'
      # msvc_toolset: defaults to 'auto', which lets the probe-msvc step pick the
      # newest installed MSVC toolset whose _MSC_VER is within the CUDA compatibility
      # cap (derived from nvcc's host_config.h). Override with an explicit pin
      # (e.g. 14.44) only for debugging. nvcc rejects _MSC_VER above the cap unless
      # the caller passes the compiler-bypass workaround banned by the lint-workflow
      # job (see the ban-grep step in that job for why — the produced wheels segfault
      # at runtime; upstream #1543). Raise the explicit pin ONLY when auto-select
      # produces unexpected results after a runner image rotation; the probe step
      # already validates both installed AND compatible.
      msvc_toolset:
        description: 'MSVC toolset pin (auto = pick newest compatible with cuda_version). Override with MAJOR.MINOR (e.g. 14.44) for debugging only.'
        type: string
        default: 'auto'
      verbose:
        description: 'Enable verbose preflight tracing (sets $env:VERBOSE=1)'
        type: boolean
        default: false
      dry_run:
        description: 'Exit green after preflight; skip downstream build (Phase 2+)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 90
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Probe and auto-select MSVC toolset
        id: probe-msvc
        shell: pwsh
        timeout-minutes: 5
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $inputToolset = '${{ inputs.msvc_toolset }}'
          $cudaVersion = '${{ inputs.cuda_version }}'

          # ── CUDA <-> MSVC compatibility matrix ──
          # Maps CUDA major.minor to the maximum _MSC_VER that nvcc's host_config.h allows.
          # Source: NVIDIA host_config.h `#if _MSC_VER >= <cap>` guards.
          # Verified against: nerfstudio#3157, NVIDIA forums, Microsoft _MSC_VER docs.
          # NOTE: CUDA 12.7 was never released (NVIDIA skipped from 12.6 to 12.8).
          # NOTE: CUDA 13.0+ raises cap to ~1959 for VS 2026 support — add when needed.
          $cudaMsvcCap = @{
            '12.2' = 1939; '12.3' = 1939
            '12.4' = 1949; '12.5' = 1949; '12.6' = 1949
            '12.8' = 1949; '12.9' = 1949
          }

          # Extract CUDA major.minor (e.g. '12.6.3' -> '12.6').
          $cudaMajorMinor = ($cudaVersion -split '\.')[0..1] -join '.'
          if (-not $cudaMsvcCap.ContainsKey($cudaMajorMinor)) {
            $supported = ($cudaMsvcCap.Keys | Sort-Object) -join ', '
            throw "CUDA $cudaMajorMinor is not in the compatibility matrix. Supported: $supported"
          }
          $mscVerCap = $cudaMsvcCap[$cudaMajorMinor]

          # ── Find VS 2022 installation via vswhere ──
          $vswhere = 'C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe'
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found at $vswhere — windows-2022 image layout has changed"
          }
          $installPath = & $vswhere -latest -property installationPath
          if (-not $installPath) {
            throw "No VS 2022 installation found on windows-2022 runner (vswhere returned empty)"
          }

          # ── Enumerate installed MSVC toolsets from disk ──
          # Authoritative — no channel queries. Enumeration is instant (~0ms).
          # Every dispatch log becomes self-documenting (shows all available toolsets).
          $toolsRoot = Join-Path $installPath 'VC\Tools\MSVC'
          if (-not (Test-Path $toolsRoot)) {
            throw "MSVC tools root not found at $toolsRoot"
          }
          $installedVersions = @(Get-ChildItem $toolsRoot -Directory |
            ForEach-Object { $_.Name } | Sort-Object)
          $installedPins = @($installedVersions |
            ForEach-Object { ($_ -split '\.')[0..1] -join '.' } |
            Sort-Object -Unique)

          # Build a lookup: pin -> full version (latest patch).
          $pinToFull = @{}
          foreach ($v in $installedVersions) {
            $pin = ($v -split '\.')[0..1] -join '.'
            $pinToFull[$pin] = $v  # last write wins = latest patch
          }

          # Compute _MSC_VER for each pin: 1900 + minor (e.g. 14.44 -> 1944).
          $pinToMscVer = @{}
          foreach ($pin in $installedPins) {
            $pinParts = $pin -split '\.'
            $pinToMscVer[$pin] = 1900 + [int]$pinParts[1]
          }

          # ── Auto-select or validate override ──
          if ($inputToolset -eq 'auto') {
            # Filter installed toolsets where _MSC_VER <= cap.
            $compatible = @($installedPins | Where-Object { $pinToMscVer[$_] -le $mscVerCap })
            if ($compatible.Count -eq 0) {
              $msg = "No installed MSVC toolset is compatible with CUDA $cudaMajorMinor (cap: _MSC_VER <= $mscVerCap).`n" +
                     "Installed pins: $($installedPins -join ', ')`n" +
                     "Their _MSC_VER values: $(($installedPins | ForEach-Object { "$_ ($($pinToMscVer[$_]))" }) -join ', ')`n" +
                     "`n" +
                     "REMEDIATION:`n" +
                     "  - Use a CUDA version with a higher _MSC_VER cap (e.g. CUDA 13.0+)`n" +
                     "  - Or use a runner image with an older MSVC toolset`n" +
                     "  - See upstream abetlen/llama-cpp-python#1543 for _MSC_VER/nvcc compatibility"
              throw $msg
            }
            # Pick the newest compatible toolset (highest minor).
            $selectedPin = $compatible | Select-Object -Last 1
            $mode = 'auto'
          } else {
            # Override mode: validate format, installed, compatible.
            $parts = $inputToolset -split '\.'
            if ($parts.Count -ne 2) { throw "msvc_toolset must be 'auto' or 'MAJOR.MINOR'; got '$inputToolset'" }
            $major = [int]$parts[0]; $minor = [int]$parts[1]
            if ($major -ne 14) { throw "msvc_toolset major must be 14 for VS 2022 (got '$major')" }

            # Check installed.
            if (-not $pinToFull.ContainsKey($inputToolset)) {
              $msg = "Requested MSVC toolset '$inputToolset' is NOT installed on this windows-2022 image.`n" +
                     "Available toolset pins: $($installedPins -join ', ')`n" +
                     "`n" +
                     "REMEDIATION:`n" +
                     "  - Re-dispatch with msvc_toolset=auto (recommended) or one of the above pins`n" +
                     "  - See actions/runner-images#9701 for VC component removal history`n" +
                     "  - See upstream abetlen/llama-cpp-python#1543 for _MSC_VER/nvcc compatibility"
              Write-Error $msg
              exit 1
            }

            # Check compatible with CUDA.
            $overrideMscVer = 1900 + $minor
            if ($overrideMscVer -gt $mscVerCap) {
              throw "MSVC $inputToolset (_MSC_VER=$overrideMscVer) exceeds cap $mscVerCap for CUDA $cudaMajorMinor. Use a lower toolset or newer CUDA."
            }
            $selectedPin = $inputToolset
            $mode = 'override'
          }

          $selectedFull = $pinToFull[$selectedPin]
          $selectedMscVer = $pinToMscVer[$selectedPin]

          # ── Unconditional diagnostic logging ──
          Write-Host "--- MSVC Auto-Select ---"
          Write-Host "CUDA version: $cudaMajorMinor (cap: _MSC_VER <= $mscVerCap)"
          Write-Host "Installed toolsets:"
          foreach ($v in $installedVersions) {
            $pin = ($v -split '\.')[0..1] -join '.'
            $compat = if ($pinToMscVer[$pin] -le $mscVerCap) { "compatible" } else { "EXCEEDS CAP" }
            $sel = if ($pin -eq $selectedPin -and $v -eq $selectedFull) { " <-- selected" } else { "" }
            Write-Host "  $v (pin: $pin, _MSC_VER=$($pinToMscVer[$pin]), $compat)$sel"
          }
          Write-Host "Selected: $selectedPin (_MSC_VER=$selectedMscVer, full=$selectedFull)"
          Write-Host "Mode: $mode"
          Write-Host "---"

          # ── Emit outputs for downstream steps ──
          "selected_toolset=$selectedPin" >> $env:GITHUB_OUTPUT
          "selected_full_version=$selectedFull" >> $env:GITHUB_OUTPUT
          "msc_ver_cap=$mscVerCap" >> $env:GITHUB_OUTPUT
          "install_path=$installPath" >> $env:GITHUB_OUTPUT

      - name: Enable Windows long paths
        shell: pwsh
        timeout-minutes: 2
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          # TC-09: avoids MSVC "fatal error C1083: cannot open compiler generated file"
          # when build/{wheel tag}/vendor/llama.cpp/ggml-cuda paths exceed 260 chars.
          # MUST run BEFORE actions/checkout@v4 — checkout will silently truncate
          # long submodule paths on some warm-start runner scenarios otherwise.
          New-ItemProperty `
            -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' `
            -Name 'LongPathsEnabled' `
            -Value 1 `
            -PropertyType DWORD `
            -Force | Out-Null
          git config --system core.longpaths true
          $enabled = (Get-ItemProperty 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem').LongPathsEnabled
          if ($enabled -ne 1) { throw "LongPathsEnabled failed to persist (got $enabled)" }
          Write-Host "LongPathsEnabled: $enabled"

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        timeout-minutes: 5
        with:
          submodules: recursive   # WF-05 — pulls vendor/llama.cpp and its own submodules (ggml)
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        timeout-minutes: 5
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'

      - name: Setup mamba
        uses: conda-incubator/setup-miniconda@v3.1.0
        timeout-minutes: 10
        with:
          activate-environment: llamacpp
          python-version: ${{ inputs.python_version }}
          miniforge-version: latest
          add-pip-as-python-dependency: true
          auto-activate-base: false

      - name: Install CUDA toolkit via mamba
        shell: pwsh
        timeout-minutes: 15
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $cudaVersion = '${{ inputs.cuda_version }}'
          $cudaChannel = "nvidia/label/cuda-$cudaVersion"
          # TC-05: single install path. No Jimver full-installer.
          # --channel-priority strict prevents conda-forge from pulling a mismatched cudart.
          mamba install -y --channel-priority strict --override-channels --channel $cudaChannel "cuda-toolkit=$cudaVersion"
          if ($LASTEXITCODE -ne 0) { throw "mamba install failed with exit code $LASTEXITCODE" }

      # NOTE: ilammy/msvc-dev-cmd is NOT used here (dropped in Plan 02 after
      # discovering the vcvarsall overflow). Conda's activation hook calls
      # vcvarsall.bat internally; a second vcvars call (from ilammy) overflows
      # CMD's 8192-char INCLUDE/LIB environment variable limit. Phase 1 preflight
      # calls cl.exe by full path from probe-msvc outputs to verify _MSC_VER —
      # no VS environment activation needed. Phase 2 (build) will activate MSVC
      # via cmake's "Visual Studio 17 2022" generator or a clean vcvarsall
      # subprocess (never ilammy). See upstream #1543 for what happens when the
      # _MSC_VER verification is skipped entirely.

      - name: 'Preflight: Assert MSVC _MSC_VER matches selected toolset and CUDA cap'
        id: assert-msvc
        shell: pwsh
        timeout-minutes: 2
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          # TC-04: two-part assertion using outputs from the probe-msvc step.
          # 1. Pin integrity: cl.exe _MSC_VER == expected value for selected toolset
          # 2. CUDA compatibility: cl.exe _MSC_VER <= CUDA cap
          $selectedToolset = '${{ steps.probe-msvc.outputs.selected_toolset }}'
          $selectedFull = '${{ steps.probe-msvc.outputs.selected_full_version }}'
          $installPath = '${{ steps.probe-msvc.outputs.install_path }}'
          $mscVerCap = [int]'${{ steps.probe-msvc.outputs.msc_ver_cap }}'
          $cudaVersion = '${{ inputs.cuda_version }}'

          # Derive expected _MSC_VER from selected toolset (e.g. 14.44 -> 1944).
          $parts = $selectedToolset -split '\.'
          $expectedMscVer = 1900 + [int]$parts[1]

          # Call cl.exe by full path (no ilammy activation needed for preflight).
          $clExe = Join-Path $installPath "VC\Tools\MSVC\$selectedFull\bin\HostX64\x64\cl.exe"
          if (-not (Test-Path $clExe)) {
            throw "cl.exe not found at $clExe — probe-msvc output may be stale"
          }
          # cl.exe writes banner to stderr; redirect 2>&1.
          $banner = (& $clExe 2>&1 | Out-String)
          $match = [regex]::Match($banner, 'Version (\d+)\.(\d+)')
          if (-not $match.Success) { throw "Failed to parse cl.exe banner: $banner" }
          $clMajor = [int]$match.Groups[1].Value
          $clMinor = [int]$match.Groups[2].Value
          # cl.exe reports '19.44'; _MSC_VER is clMajor*100 + clMinor (e.g. 19.44 -> 1944).
          $actualMscVer = $clMajor * 100 + $clMinor

          # Check 1: Pin integrity — does cl.exe match the toolset probe-msvc selected?
          if ($actualMscVer -ne $expectedMscVer) {
            $msg = "Pin integrity failed: expected _MSC_VER=$expectedMscVer for toolset $selectedToolset, got $actualMscVer.`n" +
                   "`n" +
                   "cl.exe at the selected toolset path reports a different _MSC_VER than expected.`n" +
                   "The probe-msvc step selected toolset $selectedToolset, but cl.exe reports a different version.`n" +
                   "`n" +
                   "REMEDIATION:`n" +
                   "  1. Check the 'Probe and auto-select MSVC toolset' step log`n" +
                   "  2. Verify the active toolset: cl.exe /Bv in a debug step`n" +
                   "  3. Re-dispatch with an explicit msvc_toolset override`n" +
                   "  4. See upstream abetlen/llama-cpp-python#1543 for why _MSC_VER mismatch produces segfaulting wheels"
            throw $msg
          }

          # Check 2: CUDA compatibility — is the activated MSVC within nvcc's accepted range?
          if ($actualMscVer -gt $mscVerCap) {
            $msg = "CUDA compatibility failed: _MSC_VER=$actualMscVer exceeds cap $mscVerCap for CUDA $cudaVersion.`n" +
                   "`n" +
                   "REMEDIATION:`n" +
                   "  - Use a newer CUDA version with a higher _MSC_VER cap`n" +
                   "  - Or use msvc_toolset override to pin a lower toolset`n" +
                   "  - See upstream abetlen/llama-cpp-python#1543 for _MSC_VER/nvcc compatibility"
            throw $msg
          }

          Write-Host "OK: _MSC_VER=$actualMscVer (expected=$expectedMscVer, cap=$mscVerCap)"
          "msc_ver=$actualMscVer" >> $env:GITHUB_OUTPUT

      - name: 'Preflight: Assert nvcc matches cuda_version'
        id: assert-nvcc
        shell: pwsh
        timeout-minutes: 2
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          # TC-06: compare nvcc's reported release to the major.minor of the dispatch input.
          $requestedFull = '${{ inputs.cuda_version }}'   # e.g. '12.4.1'
          $requestedMajorMinor = ($requestedFull -split '\.')[0..1] -join '.'   # '12.4'

          $nvccOut = (nvcc --version) -join "`n"
          $match = [regex]::Match($nvccOut, 'release (\d+\.\d+)')
          if (-not $match.Success) { throw "Failed to parse 'nvcc --version':`n$nvccOut" }
          $nvccMajorMinor = $match.Groups[1].Value   # '12.4'

          if ($nvccMajorMinor -ne $requestedMajorMinor) {
            $msg = "nvcc reports '$nvccMajorMinor' but dispatch input cuda_version='$requestedFull' (major.minor=$requestedMajorMinor).`n" +
                   "`n" +
                   "REMEDIATION:`n" +
                   "  - The mamba install step failed or was skipped`n" +
                   "  - A stale CUDA is winning PATH order (see Assertion 3)`n" +
                   "  - The cuda_version input is malformed"
            throw $msg
          }
          Write-Host "OK: nvcc reports $nvccMajorMinor matches requested $requestedMajorMinor"
          "nvcc_version=$nvccMajorMinor" >> $env:GITHUB_OUTPUT

      - name: 'Preflight: Assert single CUDA install path'
        id: assert-cuda-single-path
        shell: pwsh
        timeout-minutes: 2
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          # TC-07: sweep ghost env vars from prior installs (CUDA_PATH_V12_4, etc.)
          $ghosts = @(Get-ChildItem env: | Where-Object { $_.Name -match '^CUDA_PATH_V\d+_\d+$' })
          if ($ghosts.Count -gt 0) {
            foreach ($g in $ghosts) {
              Write-Warning "Removing ghost env var: $($g.Name)=$($g.Value)"
              Remove-Item "env:$($g.Name)"
            }
          }

          # Single nvcc on PATH
          $nvccPaths = @((where.exe nvcc 2>$null) -split "`n" | Where-Object { $_ -ne '' })
          if ($nvccPaths.Count -ne 1) {
            $msg = "Expected exactly one nvcc on PATH; found $($nvccPaths.Count):`n" +
                   ($nvccPaths -join "`n") + "`n" +
                   "`n" +
                   "REMEDIATION:`n" +
                   "  - Ensure mamba env is activated (conda activate llamacpp)`n" +
                   "  - Remove any Jimver-extracted CUDA from prior job state"
            throw $msg
          }

          # Ensure the one nvcc lives in CONDA_PREFIX
          if (-not $nvccPaths[0].StartsWith($env:CONDA_PREFIX)) {
            throw "nvcc at $($nvccPaths[0]) is not under CONDA_PREFIX=$env:CONDA_PREFIX"
          }
          Write-Host "OK: single nvcc at $($nvccPaths[0])"

      - name: 'Preflight: Assert llama.cpp submodule populated'
        id: assert-submodule
        shell: pwsh
        timeout-minutes: 2
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          # WF-05 double-check (catches silent submodules: recursive failures per RESEARCH.md Pitfall 2)
          if (-not (Test-Path 'vendor/llama.cpp/CMakeLists.txt')) {
            $msg = "vendor/llama.cpp/CMakeLists.txt is missing after 'submodules: recursive' checkout.`n" +
                   "`n" +
                   "REMEDIATION:`n" +
                   "  - Re-dispatch the workflow (most likely a transient network failure)`n" +
                   "  - If persistent: check .gitmodules and actions/checkout@v4 logs for warnings`n" +
                   "  - Verify the submodule isn't path-excluded by .git/info/sparse-checkout"
            throw $msg
          }
          $llamaSha = (git -C vendor/llama.cpp rev-parse --short HEAD).Trim()
          Write-Host "OK: llama.cpp submodule at $llamaSha"
          "llama_sha=$llamaSha" >> $env:GITHUB_OUTPUT

      - name: 'Preflight: Assert Python version'
        id: assert-python
        shell: pwsh
        timeout-minutes: 2
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $requested = '${{ inputs.python_version }}'   # e.g. '3.11'
          $actualRaw = (python --version 2>&1) -as [string]
          $match = [regex]::Match($actualRaw, 'Python (\d+\.\d+)')
          if (-not $match.Success) { throw "Failed to parse: $actualRaw" }
          $actual = $match.Groups[1].Value

          if ($actual -ne $requested) {
            $msg = "Python version mismatch: requested=$requested, actual=$actual`n" +
                   "`n" +
                   "REMEDIATION:`n" +
                   "  - 'where.exe python' may return multiple paths; mamba's Python must win`n" +
                   "  - setup-python cache may have served a stale interpreter`n" +
                   "  - Check that setup-miniconda activate-environment.python-version matches inputs.python_version"
            throw $msg
          }
          $pyPath = (where.exe python | Select-Object -First 1).Trim()
          Write-Host "OK: Python $actual at $pyPath"
          "python_version=$actual" >> $env:GITHUB_OUTPUT
          "python_path=$pyPath" >> $env:GITHUB_OUTPUT

      - name: 'Preflight: Discover VS 2022 BuildCustomizations path'
        id: discover-vs
        shell: pwsh
        timeout-minutes: 2
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          # TC-08: dynamic discovery, no hardcoded edition/version (no 2019\Enterprise anywhere).
          $vswhere = 'C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe'
          $vsRoot = & $vswhere -latest -property installationPath
          if (-not $vsRoot) { throw "No VS 2022 installation found (vswhere returned empty)" }

          $bcPattern = Join-Path $vsRoot 'MSBuild\Microsoft\VC\*\BuildCustomizations'
          $bcPaths = @(Get-ChildItem -Path $bcPattern -ErrorAction SilentlyContinue)
          if (-not $bcPaths -or $bcPaths.Count -eq 0) {
            $msg = "No VS 2022 BuildCustomizations path found under: $bcPattern`n" +
                   "`n" +
                   "This usually means the runner image has rotated VS editions or the VC++ workload is not installed.`n" +
                   "`n" +
                   "REMEDIATION:`n" +
                   "  - Verify windows-2022 runner image still ships VS 2022 Enterprise/Community/BuildTools`n" +
                   "  - Check actions/runner-images Windows2022-Readme.md for layout changes"
            throw $msg
          }
          $bcPath = $bcPaths[0].FullName
          Write-Host "OK: VS BuildCustomizations at $bcPath"
          "vs_install_path=$vsRoot" >> $env:GITHUB_OUTPUT
          "bc_path=$bcPath" >> $env:GITHUB_OUTPUT

      # ── Phase 2: Build body ──────────────────────────────────────────────
      # Steps below produce the CUDA wheel. They run after the Phase 1
      # preflight assertions have all passed.

      - name: 'Build: Download and install VS BuildCustomizations for CUDA integration'
        shell: pwsh
        timeout-minutes: 5
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          # BLD-07: mamba's cuda-toolkit package does NOT ship the VS integration
          # files (visual_studio_integration/MSBuildExtensions). These only come
          # from the NVIDIA CUDA installer .exe. Download it from Jimver's link
          # table, extract just the MSBuildExtensions with 7-Zip, and copy into
          # the VS BuildCustomizations directory.
          # Not cached per CONTEXT.md — just redo each run (download ~10s, extract ~2s).

          $cudaVersion = '${{ inputs.cuda_version }}'
          # Jimver link table uses base version (12.1.1 -> 12.1.0 mapping not needed for 12.6.3)
          $links = (Invoke-RestMethod 'https://raw.githubusercontent.com/Jimver/cuda-toolkit/master/src/links/windows-links.ts').Trim().Split().Where({$_ -ne ''})
          $found = $false
          for ($i = $q = 0; $i -lt $links.Count -and $q -lt 2; $i++) {
            if ($links[$i] -eq "'$cudaVersion',") { $q++ }
          }
          if ($q -lt 2) {
            throw "Could not find CUDA $cudaVersion in Jimver windows-links.ts.`n" +
                  "REMEDIATION: Check https://github.com/Jimver/cuda-toolkit/blob/master/src/links/windows-links.ts for available versions"
          }
          $url = $links[$i].Trim("'")
          Write-Host "Downloading CUDA installer for VS integration from: $url"
          Invoke-RestMethod $url -OutFile 'cudainstaller.zip'

          # Extract only MSBuildExtensions (CUDA.props, CUDA.targets, etc.)
          & 'C:\Program Files\7-Zip\7z.exe' e cudainstaller.zip -oMSBuildExtensions -r *\MSBuildExtensions\* > $null
          if ($LASTEXITCODE -ne 0) { throw "7z extraction failed with exit code $LASTEXITCODE" }
          Remove-Item 'cudainstaller.zip'

          # Copy into VS BuildCustomizations directory
          $src = (Get-Item '.\MSBuildExtensions').FullName + '\*'
          $dst = '${{ steps.discover-vs.outputs.bc_path }}'
          Copy-Item -Path $src -Destination $dst -Force
          Remove-Item -Recurse -Force '.\MSBuildExtensions'

          $copied = @(Get-ChildItem (Join-Path $dst '*.props'))
          if ($copied.Count -eq 0) {
            $msg = "No .props files found in $dst after copy.`n" +
                   "Source: CUDA installer for version $cudaVersion`n" +
                   "`n" +
                   "REMEDIATION:`n" +
                   "  - Check Jimver/cuda-toolkit windows-links.ts has this CUDA version`n" +
                   "  - Verify 7-Zip extracted MSBuildExtensions successfully`n" +
                   "  - Check discover-vs step found correct BuildCustomizations path"
            throw $msg
          }
          Write-Host "OK: copied $($copied.Count) .props file(s) to $dst"

      - name: 'Build: Restore mamba pkgs cache'
        id: cache-mamba-restore
        uses: actions/cache/restore@v4
        timeout-minutes: 5
        with:
          path: ${{ env.MAMBA_ROOT_PREFIX }}/pkgs
          key: mamba-cuda-${{ inputs.cuda_version }}-${{ runner.os }}-${{ hashFiles('.github/workflows/build-wheels-cuda-windows.yaml') }}
          restore-keys: |
            mamba-cuda-${{ inputs.cuda_version }}-${{ runner.os }}-

      - name: 'Build: Install build dependencies'
        shell: pwsh
        timeout-minutes: 5
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          # BLD-01 partial: install PEP 517 frontend + Ninja generator.
          # scikit-build-core comes from pyproject.toml build-requires (not installed here).
          python -m pip install --upgrade pip build wheel
          if ($LASTEXITCODE -ne 0) { throw "pip install build deps failed (exit $LASTEXITCODE)" }
          python -m pip install ninja
          if ($LASTEXITCODE -ne 0) { throw "pip install ninja failed (exit $LASTEXITCODE)" }

          # Verify
          $buildVer = python -m build --version
          Write-Host "python -m build version: $buildVer"
          $ninjaVer = ninja --version
          Write-Host "ninja version: $ninjaVer"

      - name: 'Build: Setup sccache'
        uses: hendrikmuhs/ccache-action@v1.2
        timeout-minutes: 5
        with:
          variant: sccache
          key: sccache-cuda-${{ inputs.cuda_version }}-${{ steps.probe-msvc.outputs.selected_toolset }}-${{ hashFiles('vendor/llama.cpp/CMakeLists.txt', 'vendor/llama.cpp/src/**') }}
          restore-keys: |
            sccache-cuda-${{ inputs.cuda_version }}-${{ steps.probe-msvc.outputs.selected_toolset }}-
          max-size: 500M

      - name: 'Build: Activate MSVC and build wheel'
        id: build-wheel
        shell: pwsh
        timeout-minutes: 60
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          # ── 1. vcvarsall activation ──
          # CRITICAL: Do NOT use ilammy/msvc-dev-cmd (vcvarsall overflow with conda).
          # Activate in this same pwsh step so INCLUDE/LIB/PATH persist for cmake.
          $installPath = '${{ steps.probe-msvc.outputs.install_path }}'
          $selectedFull = '${{ steps.probe-msvc.outputs.selected_full_version }}'
          $vcvarsall = Join-Path $installPath 'VC\Auxiliary\Build\vcvarsall.bat'

          if (-not (Test-Path $vcvarsall)) {
            throw "vcvarsall.bat not found at $vcvarsall — probe-msvc output may be stale"
          }

          # Capture env before vcvarsall
          $envBefore = @{}
          Get-ChildItem env: | ForEach-Object { $envBefore[$_.Name] = $_.Value }

          # Run vcvarsall in cmd subprocess, capture env after
          $envLines = cmd /c "`"$vcvarsall`" x64 -vcvars_ver=$selectedFull >nul 2>&1 && set"
          foreach ($line in $envLines) {
            if ($line -match '^([^=]+)=(.*)$') {
              $name = $Matches[1]; $value = $Matches[2]
              if (-not $envBefore.ContainsKey($name) -or $envBefore[$name] -ne $value) {
                Set-Item "env:$name" $value
              }
            }
          }
          $clPath = (Get-Command cl.exe -ErrorAction Stop).Source
          Write-Host "vcvarsall activated: cl.exe at $clPath"

          # ── 2. CUDA paths ──
          # Use CONDA_PREFIX\Library, NOT $env:CUDA_PATH (per Phase 1 STATE.md).
          $env:CUDA_PATH = "$env:CONDA_PREFIX\Library"
          $env:CUDA_HOME = "$env:CONDA_PREFIX\Library"

          # ── 3. Version override via __init__.py rewrite (BLD-12) ──
          # scikit-build-core's regex provider reads from __init__.py directly.
          # SETUPTOOLS_SCM_PRETEND_VERSION has zero effect here (see RESEARCH.md Pitfall 5).
          $initFile = 'llama_cpp/__init__.py'
          $content = Get-Content $initFile -Raw
          $verMatch = [regex]::Match($content, '__version__\s*=\s*"([^"]+)"')
          if (-not $verMatch.Success) { throw "Cannot parse version from $initFile" }
          $baseVersion = $verMatch.Groups[1].Value

          # 12-char SHA for collision safety in the large llama.cpp repo.
          # assert-submodule outputs a short SHA (7 chars); re-derive 12 chars.
          $llamaSha12 = (git -C vendor/llama.cpp rev-parse HEAD).Substring(0, 12)

          # Compute CUDA tag: '12.6.3' -> 'cu126'
          $cudaVer = '${{ inputs.cuda_version }}'
          $cudaParts = $cudaVer -split '\.'
          $cudaTag = "cu$($cudaParts[0])$($cudaParts[1])"

          $fullVersion = "$baseVersion+$cudaTag.ll$llamaSha12"
          Write-Host "Wheel version: $fullVersion"

          $newContent = $content -replace ('__version__\s*=\s*"[^"]+"'), "__version__ = `"$fullVersion`""
          Set-Content $initFile -Value $newContent -NoNewline

          # ── 4. CMAKE_ARGS construction (BLD-03, BLD-04, BLD-08) ──
          $cudaArchs = '80-real;86-real;89-real;90-real;90-virtual'
          $env:CMAKE_ARGS = @(
            '-G Ninja'
            '-DGGML_CUDA=on'
            "-DCMAKE_CUDA_ARCHITECTURES=$cudaArchs"
            '-DGGML_CUDA_FORCE_MMQ=ON'
            '-DGGML_AVX2=off'
            '-DGGML_FMA=off'
            '-DGGML_F16C=off'
            '-DCMAKE_C_COMPILER_LAUNCHER=sccache'
            '-DCMAKE_CXX_COMPILER_LAUNCHER=sccache'
            '-DCMAKE_CUDA_COMPILER_LAUNCHER=sccache'
            '-DCMAKE_POLICY_DEFAULT_CMP0141=NEW'
            '-DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded'
            '-DCMAKE_C_FLAGS_INIT="/Z7"'
            '-DCMAKE_CXX_FLAGS_INIT="/Z7"'
            '-DCMAKE_CUDA_FLAGS=-diag-suppress=177,221,550'
          ) -join ' '

          # Runner has 4 vCPUs but CUDA compilation with 5 arch targets is very
          # memory-heavy — parallel nvcc kills sccache daemon (os error 10054).
          $env:CMAKE_BUILD_PARALLEL_LEVEL = '1'

          # Override pyproject.toml's wheel.py-api="py3" to get cpXX tag (not py3-none).
          # Fallback if empty string doesn't work:
          #   Option 1: python -m build --wheel -C wheel.py-api=""
          #   Option 2: $env:SKBUILD_WHEEL_PY_API = "cp$('${{ inputs.python_version }}' -replace '\.','')"
          $env:SKBUILD_WHEEL_PY_API = ''

          Write-Host "CMAKE_ARGS: $env:CMAKE_ARGS"
          Write-Host "CMAKE_BUILD_PARALLEL_LEVEL: $env:CMAKE_BUILD_PARALLEL_LEVEL"
          Write-Host "SKBUILD_WHEEL_PY_API: '$env:SKBUILD_WHEEL_PY_API'"

          # ── 5. Build the wheel (BLD-01) ──
          python -m build --wheel
          if ($LASTEXITCODE -ne 0) { throw "python -m build --wheel failed with exit code $LASTEXITCODE" }

          # ── 6. Restore __init__.py (cleanup) ──
          # CRITICAL: Do NOT leave modified tracked file in the checkout.
          git checkout -- $initFile

          # ── 7. Emit wheel path output for downstream steps ──
          $wheel = (Get-ChildItem dist/*.whl | Select-Object -First 1)
          if (-not $wheel) { throw "No .whl file found in dist/ after build" }
          Write-Host "Built wheel: $($wheel.Name) ($([math]::Round($wheel.Length / 1MB, 2)) MB)"
          "wheel_version=$fullVersion" >> $env:GITHUB_OUTPUT
          "wheel_path=$($wheel.FullName)" >> $env:GITHUB_OUTPUT
          "wheel_name=$($wheel.Name)" >> $env:GITHUB_OUTPUT

      - name: 'Build: Assert wheel tag'
        shell: pwsh
        timeout-minutes: 2
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          # BLD-10: Validate wheel filename matches expected CPython tag pattern.
          # A mismatched tag (py3-none instead of cp311-cp311) means the wheel
          # will be invisible to pip on CPython installs.
          $pyVer = '${{ inputs.python_version }}' -replace '\.', ''  # '3.11' -> '311'
          $expectedPattern = "llama_cpp_python-.*-cp${pyVer}-cp${pyVer}-win_amd64\.whl$"

          $wheels = @(Get-ChildItem dist/*.whl)
          if ($wheels.Count -ne 1) {
            throw "Expected exactly 1 wheel in dist/, found $($wheels.Count): $($wheels.Name -join ', ')"
          }
          $wheelName = $wheels[0].Name

          if ($wheelName -notmatch $expectedPattern) {
            $msg = "Wheel tag assertion FAILED.`n" +
                   "  Expected pattern: $expectedPattern`n" +
                   "  Actual filename:  $wheelName`n" +
                   "`n" +
                   "REMEDIATION:`n" +
                   "  - If tag is 'py3-none': set SKBUILD_WHEEL_PY_API='' (empty string) before build`n" +
                   "  - If tag is 'abi3': check pyproject.toml wheel.py-api setting`n" +
                   "  - If tag is 'none-any': a platform-specific library is missing from the wheel"
            throw $msg
          }
          Write-Host "OK: wheel tag matches -- $wheelName"

      - name: 'Build: Assert wheel size'
        shell: pwsh
        timeout-minutes: 2
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          # BLD-11: Ensure wheel stays under the 400 MB budget.
          # A bloated wheel usually means too many CUDA architecture targets
          # or debug symbols accidentally embedded in the release build.
          $maxSizeMB = 400
          $wheel = (Get-ChildItem dist/*.whl | Select-Object -First 1)
          $sizeMB = [math]::Round($wheel.Length / 1MB, 2)

          if ($sizeMB -ge $maxSizeMB) {
            $msg = "Wheel size assertion FAILED: $sizeMB MB >= $maxSizeMB MB limit.`n" +
                   "  File: $($wheel.Name)`n" +
                   "`n" +
                   "REMEDIATION:`n" +
                   "  - Reduce CMAKE_CUDA_ARCHITECTURES (currently 5 targets)`n" +
                   "  - Drop a real target (e.g. 80-real if Ampere is not needed)`n" +
                   "  - Check if debug symbols are accidentally embedded"
            throw $msg
          }
          Write-Host "OK: wheel size $sizeMB MB < $maxSizeMB MB -- $($wheel.Name)"

      - name: 'Build: Upload wheel artifact'
        uses: actions/upload-artifact@v4
        timeout-minutes: 10
        with:
          name: cuda-wheel
          path: dist/*.whl
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

      - name: 'Build: Save mamba pkgs cache'
        if: always()
        uses: actions/cache/save@v4
        timeout-minutes: 5
        with:
          path: ${{ env.MAMBA_ROOT_PREFIX }}/pkgs
          key: ${{ steps.cache-mamba-restore.outputs.cache-primary-key }}

      - name: 'Build: Show sccache stats'
        if: always()
        shell: pwsh
        timeout-minutes: 2
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          sccache --show-stats

      - name: 'Preflight: Emit forensics summary'
        if: success()
        shell: pwsh
        timeout-minutes: 2
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $osInfo = Get-ComputerInfo -Property OsName,OsBuildNumber
          $cDrive = Get-PSDrive C
          try {
            $mambaVer = (mamba --version 2>&1 | Select-Object -First 1).ToString().Trim()
          } catch {
            $mambaVer = 'unknown'
          }

          $summary = @"
          ## Preflight Green — Toolchain Fingerprint

          | Property | Value |
          |---|---|
          | Runner OS | $($osInfo.OsName) build $($osInfo.OsBuildNumber) |
          | VS install path | ${{ steps.discover-vs.outputs.vs_install_path }} |
          | VS BuildCustomizations | ${{ steps.discover-vs.outputs.bc_path }} |
          | MSVC toolset | ${{ inputs.msvc_toolset }} (``_MSC_VER=${{ steps.assert-msvc.outputs.msc_ver }}``) |
          | nvcc version | ${{ steps.assert-nvcc.outputs.nvcc_version }} |
          | CUDA path | $env:CONDA_PREFIX\Library |
          | Python | ${{ steps.assert-python.outputs.python_version }} at ${{ steps.assert-python.outputs.python_path }} |
          | llama.cpp SHA | ${{ steps.assert-submodule.outputs.llama_sha }} |
          | mamba version | $mambaVer |
          | Disk free (C:) | $([math]::Round($cDrive.Free / 1GB, 2)) GB |
          | CPU | $env:PROCESSOR_IDENTIFIER |
          | Wheel version | ${{ steps.build-wheel.outputs.wheel_version }} |
          | Wheel filename | ${{ steps.build-wheel.outputs.wheel_name }} |

          **Dispatch inputs:**
          - ``python_version=${{ inputs.python_version }}``
          - ``cuda_version=${{ inputs.cuda_version }}``
          - ``msvc_toolset=${{ inputs.msvc_toolset }}``
          - ``dry_run=${{ inputs.dry_run }}``
          - ``verbose=${{ inputs.verbose }}``

          _Six weeks from now when a wheel built by this run segfaults for a user, this table is sufficient to reconstruct the exact toolchain state without re-dispatching._
          "@
          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          Write-Host $summary
          Write-Host "✅ Toolchain preflight passed"

      - name: 'Preflight: Emit remediation hint on failure'
        if: failure()
        shell: pwsh
        timeout-minutes: 2
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'SilentlyContinue'   # do NOT fail the summary step itself

          $hint = @"
          ## Preflight FAILED — Remediation Context

          ### Dispatch inputs
          | Input | Value |
          |---|---|
          | python_version | ``${{ inputs.python_version }}`` |
          | cuda_version | ``${{ inputs.cuda_version }}`` |
          | msvc_toolset | ``${{ inputs.msvc_toolset }}`` |
          | verbose | ``${{ inputs.verbose }}`` |

          ### First places to look
          1. **MSVC toolset availability** — If the run failed at ``Probe and auto-select MSVC toolset``, the requested pin may not be installed on the ``windows-2022`` image. Re-dispatch with ``msvc_toolset=auto`` (recommended) to let the probe pick the newest compatible toolset.
          2. **Runner image rotation** — Check https://github.com/actions/runner-images/issues/9701 for VC component removal history.
          3. **Upstream context** — Segfault root cause: https://github.com/abetlen/llama-cpp-python/issues/1543

          ### Debug env
          - PATH entries: $((($env:PATH -split ';') | Select-Object -First 10) -join ' ; ')
          - CONDA_PREFIX: $env:CONDA_PREFIX
          - Full env snapshot (first 40 entries, filtered): $(Get-ChildItem env: | Where-Object { $_.Name -match '^(CUDA|VS|PATH|CONDA|GITHUB)' } | Select-Object Name,Value | Format-Table | Out-String)
          "@
          $hint | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          Write-Host $hint

  # lint-workflow runs on ubuntu-latest in parallel with preflight (no `needs:`).
  # Two cheap static checks:
  #   1. Ban-grep: scoped to THIS FILE ONLY. This job's grep command literal is
  #      the ONE and ONLY place in this workflow where the banned CMake flag is
  #      permitted to appear (substring-matched by `grep -E` with character-class
  #      escaping to avoid self-match). Upstream's build-wheels-cuda.yaml
  #      legitimately contains that flag (reference docstring); we do not grep it.
  #      DO NOT widen scope to repo-wide without coordinating with CMakeLists.txt /
  #      pyproject.toml owners (Phase 2 territory). If this comment block ever
  #      grows a literal copy of the banned flag, the ban-grep step will self-fail
  #      on the next dispatch.
  #   2. actionlint: catches ${{ }} expression typos (e.g. `inputs.pyhton_version`)
  #      that would otherwise only surface at dispatch time. CONTEXT.md deferred
  #      a standalone actionlint workflow to v2 AUT-*; including it as one extra
  #      step here is near-free and catches a class of bugs ban-grep cannot.
  lint-workflow:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 'Lint: ban the compiler-bypass workaround flag'
        shell: bash
        run: |
          set -euo pipefail
          WORKFLOW='.github/workflows/build-wheels-cuda-windows.yaml'
          # The pattern uses a regex character class `[-]` containing only `-` so that
          # grep matches real hyphens in target files but NOT its own source line
          # (which literally contains `[-]`). This avoids the self-match bug where
          # the ban-grep would otherwise flag itself and fail every dispatch.
          # Invariant: zero matches on the workflow file.
          if grep -nHE 'allow[-]unsupported[-]compiler' "$WORKFLOW"; then
            echo "::error file=$WORKFLOW::the banned CMake flag is present (upstream #1543)"
            exit 1
          fi
          echo "OK: no banned compiler-bypass workaround flag in $WORKFLOW"

      - name: 'Lint: actionlint'
        shell: bash
        run: |
          set -euo pipefail
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color .github/workflows/build-wheels-cuda-windows.yaml
