          | System python | ``$systemPython`` |
          | Venv python | ``$venvPythonPath`` |

          ### Import resolution
          ``````
          $importPath
          ``````

          ### ggml-cuda.dll search
          ``````
          $dllSearch
          ``````

          ### cuobjdump output
          ``````
          $cuobjdumpOutput
          ``````

          ### pip list (venv)
          ``````
          $pipList
          ``````

          ### PATH (first 15 entries)
          ``````
          $($pathEntries -join "`n")
          ``````

          ### Dispatch inputs
          | Input | Value |
          |---|---|
          | python_version | ``${{ inputs.python_version }}`` |
          | cuda_version | ``${{ inputs.cuda_version }}`` |
          | msvc_toolset | ``${{ inputs.msvc_toolset }}`` |

          _If the inference test shows exit code -1073741819 (0xC0000005), the wheel segfaults at runtime. This is the exact failure mode this fork was created to prevent (upstream #1543)._
          "@
          $diag | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          Write-Host $diag

      - name: 'Smoke-test: Save mamba pkgs cache'
        if: always()
        uses: actions/cache/save@v4
        timeout-minutes: 5
        with:
          path: ${{ env.MAMBA_ROOT_PREFIX }}/pkgs
          key: ${{ steps.cache-mamba-smoke-restore.outputs.cache-primary-key }}

  # lint-workflow runs on ubuntu-latest in parallel with preflight (no `needs:`).
  # Two cheap static checks:
  #   1. Ban-grep: scoped to THIS FILE ONLY. This job's grep command literal is
  #      the ONE and ONLY place in this workflow where the banned CMake flag is
  #      permitted to appear (substring-matched by `grep -E` with character-class
  #      escaping to avoid self-match). Upstream's build-wheels-cuda.yaml
  #      legitimately contains that flag (reference docstring); we do not grep it.
  #      DO NOT widen scope to repo-wide without coordinating with CMakeLists.txt /
  #      pyproject.toml owners (Phase 2 territory). If this comment block ever
  #      grows a literal copy of the banned flag, the ban-grep step will self-fail
  #      on the next dispatch.
  #   2. actionlint: catches ${{ }} expression typos (e.g. `inputs.pyhton_version`)
  #      that would otherwise only surface at dispatch time. CONTEXT.md deferred
  #      a standalone actionlint workflow to v2 AUT-*; including it as one extra
  #      step here is near-free and catches a class of bugs ban-grep cannot.
  lint-workflow:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 'Lint: ban the compiler-bypass workaround flag'
        shell: bash
        run: |
          set -euo pipefail
          WORKFLOW='.github/workflows/build-wheels-cuda-windows.yaml'
          # The pattern uses a regex character class `[-]` containing only `-` so that
          # grep matches real hyphens in target files but NOT its own source line
          # (which literally contains `[-]`). This avoids the self-match bug where
          # the ban-grep would otherwise flag itself and fail every dispatch.
          # Invariant: zero matches on the workflow file.
          if grep -nHE 'allow[-]unsupported[-]compiler' "$WORKFLOW"; then
            echo "::error file=$WORKFLOW::the banned CMake flag is present (upstream #1543)"
            exit 1
          fi
          echo "OK: no banned compiler-bypass workaround flag in $WORKFLOW"

      - name: 'Lint: actionlint'
        shell: bash
        run: |
          set -euo pipefail
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color .github/workflows/build-wheels-cuda-windows.yaml
