          $sitePackages = & $venvPython -c "import site; print(site.getsitepackages()[0])" 2>&1
          $dllPath = Join-Path $sitePackages 'llama_cpp\lib\ggml-cuda.dll' -ErrorAction SilentlyContinue
          if (Test-Path $dllPath -ErrorAction SilentlyContinue) {
            $cuobjdumpOutput = cuobjdump --list-elf $dllPath 2>&1 | Out-String
          }

          $diag = @"
